{% extends "base.html" %}
{% block scripts %}
{{ super() }}
{% if config.extra.docs_password_protected %}
<script>
(function() {
  var PASS = "meridian2026";
  var KEY  = "meridian_docs_access";
  if (sessionStorage.getItem(KEY) === PASS) return;
  document.documentElement.style.visibility = 'hidden';
  document.addEventListener('DOMContentLoaded', function() {
    var pwd = prompt("Meridian docs — enter access password:");
    if (pwd === PASS) {
      sessionStorage.setItem(KEY, PASS);
      document.documentElement.style.visibility = 'visible';
    } else {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;">Access denied. <a href="javascript:location.reload()" style="margin-left:8px">Try again</a></div>';
      document.documentElement.style.visibility = 'visible';
    }
  });
})();
</script>
{% endif %}
{% endblock %}
